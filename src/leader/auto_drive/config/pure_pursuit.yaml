pure_pursuit_node:
  ros__parameters:
    roi_path_topic: "/roi_path"
    heading_valid_topic: "/vehicle_heading_valid"
    steer_topic: "/auto_steer_angle"
    throttle_topic: "/throttle_from_planning"
    base_frame: "leader/base_link"
    path_frame: "map"
    wheelbase: 0.724
    min_lookahead: 3.0
    max_lookahead: 5.0
    beta: 4.0
    curvature_window: 7
    curvature_ema_alpha: 0.7
    ld_ema_alpha: 0.5
    steer_limit_deg: 20.0
    min_throttle: 0.35
    max_throttle: 0.50
    throttle_ema_alpha: 0.5
    control_rate_hz: 30.0
    steer_zero_when_heading_invalid: true
    throttle_zero_when_heading_invalid: true
    goal_reached_distance: 0.8
    visualize: true
