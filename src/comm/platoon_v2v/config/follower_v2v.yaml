follower_v2v_receiver_node:
  ros__parameters:
    motion_state_topic: /v2v/leader/motion_state
    safety_state_topic: /v2v/leader/safety_state
    heartbeat_topic: /v2v/leader/heartbeat
    leader_speed_topic: /leader/velocity_mps
    leader_state_abnormal_topic: /leader/state_abnormal
    leader_state_reason_topic: /leader/state_reason
    link_stats_topic: /v2v/link_stats
    publish_rate_hz: 20.0
    motion_timeout_sec: 0.3
    heartbeat_timeout_sec: 0.5
    latency_warn_ms: 150.0

leader_preview_path_node:
  ros__parameters:
    motion_state_topic: /v2v/leader/motion_state
    path_topic: /leader_path
    frame_id: leader/leader_rear
    publish_rate_hz: 20.0
    path_length_m: 3.0
    point_spacing_m: 0.1
    motion_timeout_sec: 0.4

follower_reference_path_adapter_node:
  ros__parameters:
    input_path_topic: /v2v/leader/reference_path
    output_path_topic: /follower/lateral/reference_path
    expected_frame_id: map
    allow_empty_frame_id: false
    publish_rate_hz: 10.0
    path_timeout_sec: 0.5
    min_points: 2
